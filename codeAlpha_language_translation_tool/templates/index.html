<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingua — Translator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="wordmark">Lin<em>gua</em></div>
  <div class="tagline">A Translator for the Thoughtful Reader</div>
  <div class="rule"><span class="rule-line"></span><span class="rule-diamond"></span><span class="rule-line"></span></div>
  <div class="backend-badge">via <strong>{{ backend }}</strong></div>
</header>

<main>
  <div class="card">

    <div class="lang-bar">
      <div class="lang-select-wrap">
        <label class="field-label" for="srcLang">From</label>
        <select id="srcLang" class="lang-select">
          {% for lang in languages %}
          <option value="{{ lang.code }}" {% if lang.code == 'en' %}selected{% endif %}>{{ lang.name }}</option>
          {% endfor %}
        </select>
      </div>

      <button class="swap-btn" id="swapBtn" title="Swap languages" aria-label="Swap languages">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
      </button>

      <div class="lang-select-wrap">
        <label class="field-label" for="tgtLang">To</label>
        <select id="tgtLang" class="lang-select">
          {% for lang in languages %}
          <option value="{{ lang.code }}" {% if lang.code == 'ur' %}selected{% endif %}>{{ lang.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="panels">
      <div class="panel panel--src">
        <textarea id="srcText" placeholder="Begin typing here…" maxlength="5000" spellcheck="true" aria-label="Source text"></textarea>
        <div class="panel-footer">
          <span class="char-count" id="charCount">0 / 5000</span>
          <button class="ghost-btn" id="clearBtn">Clear</button>
        </div>
      </div>

      <div class="panel panel--tgt">
        <div class="output-area" id="output" aria-live="polite" aria-label="Translation output">
          <span class="placeholder">Translation will appear here…</span>
        </div>
        <div class="panel-footer panel-footer--tgt">
          <span></span>
          <button class="copy-btn" id="copyBtn" aria-label="Copy translation">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
      </div>
    </div>

    <div class="error-bar" id="errorBar" role="alert"></div>

    <div class="action-row">
      <button class="translate-btn" id="translateBtn">Translate</button>
      <span class="shortcut-hint">or <kbd>Ctrl</kbd>+<kbd>Enter</kbd></span>
    </div>

  </div>
</main>

<footer>
  Powered by
  {% if backend == 'azure' %}Microsoft Azure Translator
  {% elif backend == 'deepl' %}DeepL API
  {% else %}MyMemory — Translated.net
  {% endif %}
  &nbsp;·&nbsp; Lingua &copy; 2026
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
